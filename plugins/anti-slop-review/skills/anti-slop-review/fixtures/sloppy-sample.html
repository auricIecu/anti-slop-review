<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Sample</title>
<style>
  body { font-family: Inter, system-ui, sans-serif; background:#0b0b0f; color:#888; }
  .hero { text-align:center; padding:80px 20px; }
  .badge { display:inline-block; text-transform:uppercase; letter-spacing:.1em;
           background:linear-gradient(90deg,#7c3aed,#22d3ee); color:#fff;
           padding:4px 12px; border-radius:999px; }
  h1 { font-size:56px; }
  h1 em { font-family:Georgia, serif; font-style:italic; }
  .card { background:rgba(255,255,255,.06); backdrop-filter:blur(12px);
          border-left:4px solid #7c3aed; border-radius:16px; padding:24px;
          box-shadow:0 0 40px rgba(124,58,237,.5); }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .card .icon { font-size:32px; text-align:center; }
  .cta { animation: bounce 1s infinite; }
  @keyframes bounce { 50% { transform:translateY(-8px); } }
  nav a::before { content:"🏠"; }
</style>
</head>
<body>
  <section class="hero">
    <span class="badge">NUEVO</span>
    <h1>No es solo una herramienta, <em>es</em> tu superpoder</h1>
    <p>En el mundo acelerado de hoy, desbloquea tu potencial — sin límites.</p>
    <button class="cta">Empieza ahora</button>
  </section>
  <section class="grid">
    <div class="card"><div class="icon">⚡</div><h3>Rápido</h3><p>Texto.</p></div>
    <div class="card"><div class="icon">🔒</div><h3>Seguro</h3><p>Texto.</p></div>
    <div class="card"><div class="icon">📈</div><h3>Escalable</h3><p>Texto.</p></div>
  </section>
</body>
</html>
